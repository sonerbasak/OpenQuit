name: CI / CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: openquit
        run: flutter pub get

      - name: Analyze
        working-directory: openquit
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        working-directory: openquit
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: openquit/coverage/lcov.info
          fail_ci_if_error: false

  # ── 2. Version bump + Build + Release (sadece main/master push) ────────────
  release:
    name: Version Bump & Release
    runs-on: ubuntu-latest
    needs: test
    # PR'larda çalışmasın, sadece doğrudan push'ta çalışsın
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Bot commit'lerinin tekrar pipeline tetiklememesi için token
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if version bump commit
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -q "^chore: bump version"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute next version
        if: steps.check.outputs.skip == 'false'
        id: ver
        run: |
          # Son v*.*.* tag'ini bul
          LAST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LAST" ]; then
            # Hiç tag yoksa mevcut pubspec'ten oku ve bir artır
            CURRENT=$(grep '^version:' openquit/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            PATCH=$((PATCH+1))
            NEW_VER="${MAJOR}.${MINOR}.${PATCH}"
          else
            CLEAN="${LAST#v}"
            MAJOR=$(echo "$CLEAN" | cut -d. -f1)
            MINOR=$(echo "$CLEAN" | cut -d. -f2)
            PATCH=$(echo "$CLEAN" | cut -d. -f3)
            PATCH=$((PATCH+1))
            NEW_VER="${MAJOR}.${MINOR}.${PATCH}"
          fi

          # versionCode = son tag'den itibaren toplam commit sayısı (her zaman artar)
          BUILD_NUM=$(git rev-list --count HEAD)

          echo "version=${NEW_VER}" >> $GITHUB_OUTPUT
          echo "build=${BUILD_NUM}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VER}" >> $GITHUB_OUTPUT
          echo "full=${NEW_VER}+${BUILD_NUM}" >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i "s/^version: .*/version: ${{ steps.ver.outputs.full }}/" openquit/pubspec.yaml

      - uses: actions/setup-java@v4
        if: steps.check.outputs.skip == 'false'
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.skip == 'false'
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Get dependencies
        if: steps.check.outputs.skip == 'false'
        working-directory: openquit
        run: flutter pub get

      - name: Build APK
        if: steps.check.outputs.skip == 'false'
        working-directory: openquit
        run: flutter build apk --release --split-per-abi

      - name: Commit, tag & push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openquit/pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.ver.outputs.tag }}"
          git tag ${{ steps.ver.outputs.tag }}
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "OpenQuit ${{ steps.ver.outputs.tag }}"
          generate_release_notes: true
          files: openquit/build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
