name: CI / CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: openquit
        run: flutter pub get

      - name: Analyze (lint)
        working-directory: openquit
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: openquit
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: openquit/coverage/lcov.info
          fail_ci_if_error: false

  # ── 2. Build Android APK ───────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: openquit
        run: flutter pub get

      - name: Build APK (release)
        working-directory: openquit
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: openquit/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  # ── 3. GitHub Release (sadece main/master push'ta) ─────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: apks/

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' openquit/pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "OpenQuit ${{ steps.version.outputs.version }} (#${{ github.run_number }})"
          body: |
            ## 🚀 Otomatik Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Tarih:** ${{ github.event.head_commit.timestamp }}

            ### Değişiklikler
            ${{ github.event.head_commit.message }}

            ### İndirme
            Aşağıdaki APK dosyalarından cihazınıza uygun olanı indirin:
            - `arm64-v8a` → Modern Android telefonlar (önerilen)
            - `armeabi-v7a` → Eski Android telefonlar
            - `x86_64` → Emülatör
          files: apks/*.apk
          draft: false
          prerelease: false
