name: CI / CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch    # 1.0.1 → 1.0.2
          - minor    # 1.0.1 → 1.1.0
          - major    # 1.0.1 → 2.0.0

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: openquit
        run: flutter pub get

      - name: Analyze
        working-directory: openquit
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        working-directory: openquit
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: openquit/coverage/lcov.info
          fail_ci_if_error: false

  # ── 2. Build Android APK ───────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: openquit
        run: flutter pub get

      - name: Build APK
        working-directory: openquit
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: openquit/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  # ── 3. Release (sadece manuel tetiklemede) ─────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tag geçmişi için tüm history lazım

      - name: Compute next version
        id: ver
        run: |
          # Son v*.*.* tag'ini bul, yoksa v1.0.0'dan başla
          LAST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LAST" ]; then
            LAST="v1.0.1"   # ilk release — mevcut 1.0.0+1'den büyük
          else
            # Major.Minor.Patch'i ayır
            CLEAN="${LAST#v}"
            MAJOR=$(echo "$CLEAN" | cut -d. -f1)
            MINOR=$(echo "$CLEAN" | cut -d. -f2)
            PATCH=$(echo "$CLEAN" | cut -d. -f3)

            case "${{ github.event.inputs.bump }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
            esac

            LAST="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "tag=$LAST" >> $GITHUB_OUTPUT
          echo "version=${LAST#v}" >> $GITHUB_OUTPUT

      - name: Update pubspec version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.ver.outputs.version }}/" openquit/pubspec.yaml

      - name: Commit & tag version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openquit/pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.ver.outputs.tag }}"
          git tag ${{ steps.ver.outputs.tag }}
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "OpenQuit ${{ steps.ver.outputs.tag }}"
          generate_release_notes: true
          files: apks/*.apk
          draft: false
          prerelease: false
