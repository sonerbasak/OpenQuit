name: CI / CD

on:
  push:
    branches: ["main", "master"]
    tags: ["v*.*.*"]          # v1.0.0, v1.2.3 gibi tag'lerde release çıkar
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: openquit
        run: flutter pub get

      - name: Analyze
        working-directory: openquit
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        working-directory: openquit
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: openquit/coverage/lcov.info
          fail_ci_if_error: false

  # ── 2. Build Android APK ───────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: openquit
        run: flutter pub get

      - name: Build APK
        working-directory: openquit
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: openquit/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  # ── 3. GitHub Release (sadece v*.*.* tag push'larında) ────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OpenQuit ${{ github.ref_name }}"
          generate_release_notes: true   # commit'lerden otomatik changelog
          files: apks/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease
