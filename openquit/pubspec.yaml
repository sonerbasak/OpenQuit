name: openquit
description: An open-source addiction tracking app — privacy-first, no cloud.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4

  # Functional Programming / Error Handling
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Charts
  fl_chart: ^0.69.0

  # Calendar
  table_calendar: ^3.1.2

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.4.0

  # UI
  google_fonts: ^6.2.1
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  injectable_generator: ^2.4.2
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
